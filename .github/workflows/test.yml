name: test

# Runs the toolkit's test suite on every push and PR. Lightweight by design —
# the toolkit itself is stdlib-only except for the streamlit web wrapper and
# python-docx (clearance-chain upload), so the install step is fast.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile-check every Python file
        # Catches syntax errors before pytest even loads. Excludes .venv and
        # the cache directory so we don't waste cycles on third-party code.
        run: |
          python -m compileall -q -x '(\.venv|__pycache__|\.pytest_)' .

      - name: Run pytest
        run: |
          python -m pytest tests/ -v
