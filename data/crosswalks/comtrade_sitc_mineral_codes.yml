schema_version: "1.0"
source: https://comtradeapi.un.org/files/v1/app/reference/
scope_note: >-
  Selected upstream and primary-material SITC headings for the portal's 1962-1992
  pilot. Revisions are separate statistical vintages. Codes are not summed across
  revisions, and contained-mineral quantities are not inferred from ores, alloys,
  oxides, or intermediate products.
